name: Copy Public Issue To Private

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  copy-to-private:
    runs-on: ubuntu-latest
    steps:
      - name: Add public issue to public project
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PRIVATE_ISSUES_TOKEN }}
          script: |
            const projectId = 'PVT_kwDOEDBQnc4BYtmd';
            const statusFieldId = 'PVTSSF_lADOEDBQnc4BYtmdzhTxZ4k';
            const todoOptionId = 'f75ad846';

            const added = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item {
                    id
                  }
                }
              }
            `, {
              projectId,
              contentId: context.payload.issue.node_id,
            });

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `, {
              projectId,
              itemId: added.addProjectV2ItemById.item.id,
              fieldId: statusFieldId,
              optionId: todoOptionId,
            });

      - name: Create private copy
        id: create_private_issue
        uses: actions/github-script@v8
        env:
          PRIVATE_REPO: StreamHavoc/issues-private
        with:
          github-token: ${{ secrets.PRIVATE_ISSUES_TOKEN }}
          script: |
            const [owner, repo] = process.env.PRIVATE_REPO.split('/');
            const issue = context.payload.issue;
            const labelNames = (issue.labels || []).map((label) => label.name);
            const mirroredLabels = labelNames.filter((name) =>
              ['type:bug', 'type:feature', 'type:support'].includes(name)
            );
            mirroredLabels.push('source:public');

            const body = [
              'This issue was created automatically from the public Stream Havoc issue tracker.',
              '',
              `Public issue: ${issue.html_url}`,
              `Reported by: @${issue.user.login}`,
              '',
              '---',
              '',
              issue.body || '_No description provided._',
            ].join('\n');

            const created = await github.rest.issues.create({
              owner,
              repo,
              title: `[Public] ${issue.title}`,
              body,
              labels: mirroredLabels,
            });

            core.setOutput('private_issue_number', created.data.number);
            core.setOutput('private_issue_node_id', created.data.node_id);

      - name: Add private issue to private project
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PRIVATE_ISSUES_TOKEN }}
          script: |
            const projectId = 'PVT_kwDOEDBQnc4BX3oZ';
            const statusFieldId = 'PVTSSF_lADOEDBQnc4BX3oZzhTBhbc';
            const todoOptionId = 'f75ad846';
            const contentId = '${{ steps.create_private_issue.outputs.private_issue_node_id }}';

            const added = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item {
                    id
                  }
                }
              }
            `, {
              projectId,
              contentId,
            });

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `, {
              projectId,
              itemId: added.addProjectV2ItemById.item.id,
              fieldId: statusFieldId,
              optionId: todoOptionId,
            });

      - name: Confirm internal tracking on public issue
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Thanks for the report. We have copied this into our internal tracker for triage.',
            });
