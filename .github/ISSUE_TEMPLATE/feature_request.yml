name: Feature Request
description: Suggest an idea or improvement for Stream Havoc.
title: "[Feature]: "
labels:
  - type:feature
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Please focus on the problem and the value it would create.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the need, frustration, or opportunity.
      placeholder: I wish there was a way to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      description: Describe the feature or improvement you want.
      placeholder: It would be great if Stream Havoc could...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any workarounds or alternate ideas you have already considered.
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, examples, screenshots, or related links.
