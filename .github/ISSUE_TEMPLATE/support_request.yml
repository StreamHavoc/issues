name: Support Request
description: Ask for help with setup, troubleshooting, or using Stream Havoc.
title: "[Support]: "
labels:
  - type:support
body:
  - type: markdown
    attributes:
      value: |
        If you just need a quick conversation, you can also join the Stream Havoc Discord.
  - type: textarea
    id: request
    attributes:
      label: Support request
      description: Fill in as much or as little as you can.
      placeholder: |
        What do you need help with?
        Describe the issue or question clearly.

        What have you already tried?
        Tell us anything you have already attempted.

        Environment
        Device, browser, OS, or setup details that may help.

        Additional context
        Screenshots, logs, links, or anything else useful.
    validations:
      required: true
