name: Bug Report
description: File a bug report for something that is broken or behaving incorrectly.
title: "[Bug]: "
labels:
  - type:bug
body:
  - type: textarea
    id: report
    attributes:
      label: Bug report
      value: |
        What happened?
        Describe the bug clearly.

        Additional context
        Screenshots, logs, links, or anything else helpful.
    validations:
      required: true
