name: Bug Report
description: File a bug report for something that is broken or behaving incorrectly.
title: "[Bug]: "
labels:
  - type:bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. The more detail you include, the easier it is for us to reproduce and fix.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Tell us what went wrong.
      placeholder: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Walk us through how to trigger the issue.
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Describe the expected result.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, device, OS, or any relevant environment details.
      placeholder: Windows 11, Chrome 136, Twitch panel view
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, logs, links, or anything else helpful.
