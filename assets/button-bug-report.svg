  <text x="100" y="20" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2" text-anchor="middle">BUG REPORT</text>
  <text x="240" y="20" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2" text-anchor="middle">OPEN</text>
</svg>
